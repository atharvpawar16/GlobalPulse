<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlobalPulse — World Intelligence Dashboard</title>
  <meta name="description" content="Real-time global crisis monitoring — satellite map, live events, AI-powered intelligence." />
  <meta name="theme-color" content="#050a12" />
  <meta property="og:title" content="GlobalPulse — World Intelligence Dashboard" />
  <meta property="og:description" content="Real-time global crisis monitoring with satellite map and live events." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Mobile top bar -->
  <div id="topbar">
    <div class="topbar-logo">
      <span class="topbar-globe">🌍</span>
      <span class="topbar-name">GlobalPulse</span>
    </div>
    <button id="btnThemeMobile" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebarOverlay"></div>

  <div class="main-layout">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo-text">🌍 GlobalPulse</div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="live-badge"><span class="dot"></span> LIVE</div>
          <button id="btnThemeDesktop" onclick="toggleTheme()" class="icon-btn" title="Toggle theme">🌙</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('events')">Events</button>
        <button class="tab" onclick="switchTab('alerts')">Alerts</button>
        <button class="tab" onclick="switchTab('feeds')">Feeds</button>
      </div>

      <!-- Events Tab -->
      <div id="tab-events" class="tab-content">
        <input id="searchInput" type="text" placeholder="🔍 Search events..." oninput="onSearch()" />
        <div class="section-title">Filter</div>
        <select id="filterCategory">
          <option value="">All Categories</option>
          <option value="conflict">⚔️ Conflict</option>
          <option value="disaster">🌊 Disaster</option>
          <option value="political">🏛️ Political</option>
          <option value="cyber">💻 Cyber</option>
          <option value="news">📰 News</option>
        </select>
        <select id="filterHours">
          <option value="6">Last 6 hours</option>
          <option value="24" selected>Last 24 hours</option>
          <option value="72">Last 3 days</option>
          <option value="168">Last 7 days</option>
        </select>
        <select id="filterSeverity">
          <option value="">Any Severity</option>
          <option value="2">2+</option>
          <option value="3">3+ Moderate</option>
          <option value="4">4+ High</option>
          <option value="5">5 Critical</option>
        </select>
        <button id="btnApply" onclick="loadEvents()">Apply Filters</button>

        <div class="section-title" style="margin-top:14px">Stats (24h)</div>
        <div id="statsBox"></div>

        <div class="section-title" style="margin-top:14px">
          Recent Events <span id="eventCount" class="count-badge"></span>
          <span id="lastUpdated" class="last-updated"></span>
        </div>
        <div id="loadingEvents" class="loading-row hidden">
          <div class="mini-spinner"></div> Loading events...
        </div>
        <div id="eventList"></div>
        <button id="btnLoadMore" class="btn-loadmore hidden" onclick="loadMore()">Load more</button>
      </div>

      <!-- Alerts Tab -->
      <div id="tab-alerts" class="tab-content hidden">
        <div class="section-title">Create Alert Rule</div>
        <input id="alertName" type="text" placeholder="Rule name" class="text-input" />
        <select id="alertCategory">
          <option value="">Any Category</option>
          <option value="conflict">⚔️ Conflict</option>
          <option value="disaster">🌊 Disaster</option>
          <option value="political">🏛️ Political</option>
          <option value="cyber">💻 Cyber</option>
        </select>
        <input id="alertCountry" type="text" placeholder="Country (optional)" class="text-input" />
        <select id="alertSeverity">
          <option value="1">Any Severity</option>
          <option value="2">2+</option>
          <option value="3">3+ Moderate</option>
          <option value="4">4+ High</option>
          <option value="5">Critical only</option>
        </select>
        <button class="btn-primary" onclick="createAlert()">+ Add Rule</button>
        <div class="section-title" style="margin-top:14px">Active Rules</div>
        <div id="alertList"></div>
      </div>

      <!-- Feeds Tab -->
      <div id="tab-feeds" class="tab-content hidden">
        <div class="section-title">Data Sources</div>
        <div id="feedList"></div>
      </div>

      <!-- Sidebar footer -->
      <div class="sidebar-footer">
        Built by <a href="https://github.com/atharvpawar16" target="_blank" rel="noopener noreferrer">Atharv Pawar</a>
      </div>
    </aside>

    <!-- Map -->
    <main id="mapContainer">
      <div id="map"></div>

      <!-- Layer switcher -->
      <div id="layerSwitcher">
        <button class="layer-btn active" data-layer="satellite" onclick="switchLayer('satellite')">🛰 Satellite</button>
        <button class="layer-btn" data-layer="hybrid" onclick="switchLayer('hybrid')">🗺 Hybrid</button>
        <button class="layer-btn" data-layer="street" onclick="switchLayer('street')">🏙 Street</button>
      </div>

      <!-- Legend -->
      <div id="legend">
        <div class="legend-item"><span class="ldot" style="background:#f85149"></span>Conflict</div>
        <div class="legend-item"><span class="ldot" style="background:#d29922"></span>Disaster</div>
        <div class="legend-item"><span class="ldot" style="background:#58a6ff"></span>Political</div>
        <div class="legend-item"><span class="ldot" style="background:#bc8cff"></span>Cyber</div>
        <div class="legend-item"><span class="ldot" style="background:#3fb950"></span>News</div>
      </div>

      <!-- Map watermark -->
      <div id="mapWatermark">GlobalPulse · by Atharv Pawar</div>
    </main>

  </div>

  <!-- Detail Panel -->
  <div id="detailPanel" class="hidden">
    <button id="closeDetail" onclick="closeDetail()" title="Close (ESC)">✕ <span style="font-size:0.65rem;opacity:0.5">ESC</span></button>
    <div id="detailContent"></div>
  </div>

  <!-- Toasts -->
  <div id="toastContainer"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
