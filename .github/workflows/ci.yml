name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend/GlobalPulse.Api.csproj

      - name: Build
        run: dotnet build backend/GlobalPulse.Api.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish backend/GlobalPulse.Api.csproj -c Release --no-build -o ./publish
