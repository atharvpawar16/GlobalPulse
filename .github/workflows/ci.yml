name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/GlobalPulse.Api.csproj

      - name: Build
        run: dotnet build backend/GlobalPulse.Api.csproj --no-restore --configuration Release

      - name: Check frontend files exist
        run: |
          test -f backend/wwwroot/index.html
          test -f backend/wwwroot/app.js
          test -f backend/wwwroot/style.css
          echo "Frontend files OK"
